<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>染发大师系列课程 基础篇考核 - 后台</title>
  <script src="config.js"></script>
  <style>
    :root {
      --blue: #2068ff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ec;
      --soft: #f4f7ff;
      --good: #0f8a53;
      --warn: #c26a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #eef2f8;
      color: var(--ink);
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 18px 20px;
    }
    .wrap {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: 0;
    }
    .link {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
    }
    main {
      padding: 18px 0 36px;
    }
    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) repeat(4, auto);
      gap: 10px;
      align-items: center;
    }
    input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
    }
    button, .button {
      height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 13px;
      background: var(--blue);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    button.secondary {
      background: #edf2ff;
      color: #1649b2;
    }
    button.danger {
      background: #fff0f0;
      color: #b42318;
    }
    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--soft);
    }
    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1.2;
    }
    .stat span {
      color: var(--muted);
      font-size: 13px;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      min-width: 940px;
      border-collapse: collapse;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      background: #fafbff;
      position: sticky;
      top: 0;
    }
    .score {
      font-weight: 800;
      color: var(--good);
    }
    .pending {
      color: var(--warn);
      font-weight: 700;
    }
    .answers {
      max-width: 420px;
      font-size: 13px;
      color: #344054;
      word-break: break-word;
    }
    .empty {
      padding: 32px 14px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .controls input {
        grid-column: 1 / -1;
      }
      .stats {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>染发大师系列课程<br>基础篇考核后台</h1>
      <a class="link" href="index.html">返回问卷</a>
    </div>
  </header>
  <main class="wrap">
    <section class="panel">
      <div class="controls">
        <input id="adminToken" type="password" autocomplete="current-password" placeholder="在线后台密码">
        <button id="loadOnline">读取在线后台</button>
        <button class="secondary" id="loadLocal">读取本机记录</button>
        <button class="secondary" id="exportCsv">导出表格</button>
        <button class="danger" id="clearLocal">清空本机</button>
      </div>
      <p class="note" id="statusText">如果还没有接 Google 表格，这里会显示本机浏览器保存的测试记录。</p>
    </section>

    <section class="stats" aria-label="统计">
      <div class="stat"><strong id="totalCount">0</strong><span>提交人数</span></div>
      <div class="stat"><strong id="avgScore">-</strong><span>平均分</span></div>
      <div class="stat"><strong id="bestScore">-</strong><span>最高分</span></div>
      <div class="stat"><strong id="savedMode">本机</strong><span>当前数据来源</span></div>
    </section>

    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>提交时间</th>
              <th>姓名</th>
              <th>分数</th>
              <th>百分比</th>
              <th>未答题</th>
              <th>记录位置</th>
              <th>答案</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="empty" id="emptyState">暂无记录</div>
    </section>
  </main>

  <script>
    (function () {
      var STORAGE_KEY = 'wjxY2ECFUTSubmissions';
      var records = [];
      var currentMode = '本机';

      function config() {
        return window.WJX_EXAM_CONFIG || {};
      }

      function setStatus(text) {
        document.getElementById('statusText').textContent = text;
      }

      function formatDate(value) {
        if (!value) return '';
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString('zh-CN', { hour12: false });
      }

      function normalizeRecord(record) {
        return {
          submittedAt: record.submittedAt || record.time || '',
          name: record.name || record.nameZh || record.nameEn || '未填写',
          score: record.score,
          total: record.total,
          percent: record.percent,
          unanswered: record.unansweredNumbers || record.unanswered || [],
          remoteSaved: Boolean(record.remoteSaved || record.remoteId),
          answers: record.answers || {},
          answerTexts: record.answerTexts || {}
        };
      }

      function answerText(answers, answerTexts) {
        return Object.keys(answers).sort(function (a, b) {
          return Number(a.slice(1)) - Number(b.slice(1));
        }).map(function (key) {
          var value = answers[key];
          if (value && typeof value === 'object') value = value.value;
          var label = answerTexts && answerTexts[key] ? ' ' + answerTexts[key] : '';
          return key + ':' + (value || '') + label;
        }).join('  ');
      }

      function render() {
        var normalized = records.map(normalizeRecord);
        var tbody = document.getElementById('rows');
        tbody.innerHTML = '';
        document.getElementById('emptyState').style.display = normalized.length ? 'none' : 'block';
        normalized.forEach(function (record) {
          var tr = document.createElement('tr');
          var score = record.total ? '<span class="score">' + record.score + '/' + record.total + '</span>' : '<span class="pending">待判分</span>';
          tr.innerHTML = [
            '<td>' + escapeHtml(formatDate(record.submittedAt)) + '</td>',
            '<td>' + escapeHtml(record.name) + '</td>',
            '<td>' + score + '</td>',
            '<td>' + (record.percent === null || record.percent === undefined ? '-' : escapeHtml(record.percent + '%')) + '</td>',
            '<td>' + escapeHtml(Array.isArray(record.unanswered) ? record.unanswered.join(', ') : record.unanswered) + '</td>',
            '<td>' + (record.remoteSaved ? '在线后台' : '本机浏览器') + '</td>',
            '<td class="answers">' + escapeHtml(answerText(record.answers, record.answerTexts)) + '</td>'
          ].join('');
          tbody.appendChild(tr);
        });

        var scored = normalized.filter(function (item) { return Number(item.total) > 0; });
        var average = scored.length ? Math.round(scored.reduce(function (sum, item) {
          return sum + Number(item.score || 0);
        }, 0) / scored.length * 10) / 10 : '-';
        var best = scored.length ? Math.max.apply(null, scored.map(function (item) {
          return Number(item.score || 0);
        })) : '-';
        document.getElementById('totalCount').textContent = normalized.length;
        document.getElementById('avgScore').textContent = average;
        document.getElementById('bestScore').textContent = best;
        document.getElementById('savedMode').textContent = currentMode;
      }

      function escapeHtml(value) {
        return String(value === null || value === undefined ? '' : value).replace(/[&<>"']/g, function (char) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
          }[char];
        });
      }

      function readLocal() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch (error) {
          return [];
        }
      }

      function jsonp(url, params) {
        return new Promise(function (resolve, reject) {
          var callbackName = 'wjxAdminCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
          var script = document.createElement('script');
          var timeout = window.setTimeout(function () {
            cleanup();
            reject(new Error('读取超时'));
          }, 12000);

          function cleanup() {
            window.clearTimeout(timeout);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
          }

          window[callbackName] = function (data) {
            cleanup();
            resolve(data);
          };

          params.callback = callbackName;
          script.onerror = function () {
            cleanup();
            reject(new Error('无法连接在线后台'));
          };
          script.src = url + (url.indexOf('?') === -1 ? '?' : '&') + Object.keys(params).map(function (key) {
            return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
          }).join('&');
          document.body.appendChild(script);
        });
      }

      function loadLocalRecords() {
        currentMode = '本机';
        records = readLocal();
        setStatus('已读取本机浏览器记录。同一个浏览器提交的测试，会出现在这里。');
        render();
      }

      function loadOnlineRecords() {
        var backendUrl = (config().backendUrl || '').trim();
        if (!backendUrl) {
          setStatus('还没有接入在线后台。请先把 Google Apps Script 地址填进 config.js。');
          return;
        }
        var token = document.getElementById('adminToken').value.trim();
        if (!token) {
          setStatus('请输入在线后台密码。');
          return;
        }
        setStatus('正在读取在线后台...');
        jsonp(backendUrl, { action: 'list', token: token }).then(function (data) {
          if (!data || !data.ok) throw new Error((data && data.error) || '读取失败');
          currentMode = '在线';
          records = data.records || [];
          setStatus('已读取在线后台记录。');
          render();
        }).catch(function (error) {
          setStatus(error.message || '读取在线后台失败');
        });
      }

      function exportCsv() {
        var normalized = records.map(normalizeRecord);
        var header = ['提交时间', '姓名', '分数', '总题数', '百分比', '未答题', '记录位置', '答案'];
        var lines = [header].concat(normalized.map(function (record) {
          return [
            formatDate(record.submittedAt),
            record.name,
            record.score === undefined || record.score === null ? '' : record.score,
            record.total || '',
            record.percent === undefined || record.percent === null ? '' : record.percent,
            Array.isArray(record.unanswered) ? record.unanswered.join(' ') : record.unanswered,
            record.remoteSaved ? '在线后台' : '本机浏览器',
            answerText(record.answers, record.answerTexts)
          ];
        })).map(function (row) {
          return row.map(function (cell) {
            return '"' + String(cell === null || cell === undefined ? '' : cell).replace(/"/g, '""') + '"';
          }).join(',');
        }).join('\n');
        var blob = new Blob(['\ufeff' + lines], { type: 'text/csv;charset=utf-8' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '染发大师基础篇考核记录.csv';
        link.click();
        URL.revokeObjectURL(link.href);
      }

      document.getElementById('loadLocal').addEventListener('click', loadLocalRecords);
      document.getElementById('loadOnline').addEventListener('click', loadOnlineRecords);
      document.getElementById('exportCsv').addEventListener('click', exportCsv);
      document.getElementById('clearLocal').addEventListener('click', function () {
        if (!confirm('确定清空本机浏览器里的测试记录吗？在线后台不会受影响。')) return;
        localStorage.removeItem(STORAGE_KEY);
        loadLocalRecords();
      });

      loadLocalRecords();
    })();
  </script>
</body>
</html>
